name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos-arm:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      
      - name: Set up Python
        run: uv python install 3.11
      
      - name: Install dependencies
        run: |
          uv sync
          uv pip install pyinstaller
      
      - name: Build macOS ARM app
        run: uv run pyinstaller build.spec
      
      - name: Create zip
        run: |
          cd dist
          zip -r ClashProxyTimer-macOS-arm64.zip *.app
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClashProxyTimer-macOS-arm64
          path: dist/ClashProxyTimer-macOS-arm64.zip

  build-macos-intel:
    runs-on: macos-13
    continue-on-error: true  # 允许失败，不影响其他 job
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      
      - name: Set up Python
        run: uv python install 3.11
      
      - name: Install dependencies
        run: |
          uv sync
          uv pip install pyinstaller
      
      - name: Build macOS Intel app
        run: uv run pyinstaller build.spec
      
      - name: Create zip
        run: |
          cd dist
          zip -r ClashProxyTimer-macOS-x64.zip *.app
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClashProxyTimer-macOS-x64
          path: dist/ClashProxyTimer-macOS-x64.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      
      - name: Set up Python
        run: uv python install 3.11
      
      - name: Install dependencies
        run: |
          uv sync
          uv pip install pyinstaller
      
      - name: Build Windows exe
        run: uv run pyinstaller build.spec
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClashProxyTimer-Windows-x64
          path: dist/ClashProxyTimer.exe

  release:
    needs: [build-macos-arm, build-macos-intel, build-windows]
    runs-on: ubuntu-latest
    if: ${{ always() && !cancelled() && needs.build-macos-arm.result == 'success' && needs.build-windows.result == 'success' }}
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Display structure
        run: ls -R artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/ClashProxyTimer-macOS-arm64/ClashProxyTimer-macOS-arm64.zip
            artifacts/ClashProxyTimer-macOS-x64/ClashProxyTimer-macOS-x64.zip
            artifacts/ClashProxyTimer-Windows-x64/ClashProxyTimer.exe
          fail_on_unmatched_files: false  # 允许部分文件缺失
          generate_release_notes: true
