name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: false
        default: ''

jobs:
  build-macos-arm:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      
      - name: Set up Python
        run: uv python install 3.11
      
      - name: Install dependencies
        run: |
          uv sync
          uv pip install pyinstaller
      
      - name: Build macOS ARM app
        run: uv run pyinstaller build.spec
      
      - name: Create zip
        run: |
          cd dist
          zip -r ClashProxyTimer-macOS-arm64.zip *.app
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClashProxyTimer-macOS-arm64
          path: dist/ClashProxyTimer-macOS-arm64.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # ---- sciter_bridge DLL (memory-injection mode, scheme B) ----
      # The Sciter SDK is fetched by CMake FetchContent at configure time,
      # so no extra setup besides MSVC (already on windows-latest) + cmake.
      # We build BOTH x64 and x86 so the Python injector can pick the
      # bitness that matches the running AJiaSu process.
      - name: Configure sciter_bridge (x64)
        run: cmake -S bridge_inject -B build/bridge_x64 -A x64
      - name: Build sciter_bridge (x64)
        run: cmake --build build/bridge_x64 --config Release

      - name: Configure sciter_bridge (x86)
        run: cmake -S bridge_inject -B build/bridge_x86 -A Win32
      - name: Build sciter_bridge (x86)
        run: cmake --build build/bridge_x86 --config Release

      - name: List bridge DLLs
        run: dir bridge_inject\dist
        shell: cmd

      # ---- Python app ----
      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: |
          uv sync
          uv pip install pyinstaller

      - name: Build Windows exe
        run: uv run pyinstaller build.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClashProxyTimer-Windows-x64
          path: dist/ClashProxyTimer.exe

  release:
    needs: [build-macos-arm, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Display structure
        run: ls -R artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          files: |
            artifacts/ClashProxyTimer-macOS-arm64/ClashProxyTimer-macOS-arm64.zip
            artifacts/ClashProxyTimer-Windows-x64/ClashProxyTimer.exe
          generate_release_notes: true
